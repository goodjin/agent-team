<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>字母交互界面</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>字母交互界面</h1>
        
        <div class="control-panel">
            <div class="mode-selector">
                <span>显示模式：</span>
                <button id="displayAllBtn" class="active">显示全部</button>
                <button id="randomBtn">随机显示</button>
            </div>
            
            <div class="letter-info">
                <div>已选择字母：<span id="selectedLetter">无</span></div>
                <div>点击次数：<span id="clickCount">0</span></div>
            </div>
        </div>
        
        <div class="letter-container" id="letterContainer">
            <!-- 字母将通过JavaScript动态生成 -->
        </div>
        
        <div class="reset-btn">
            <button id="resetBtn">重置选择</button>
        </div>
    </div>
    
    <script src="script.js"></script>
</body>
</html>
