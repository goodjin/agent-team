<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>字母大挑战 - 网页版字母小游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .game-container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            padding: 40px;
            max-width: 500px;
            width: 100%;
            text-align: center;
        }

        h1 {
            color: #667eea;
            margin-bottom: 10px;
            font-size: 2em;
        }

        .subtitle {
            color: #888;
            margin-bottom: 30px;
        }

        .stats-bar {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
        }

        .stat {
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .stat-label {
            font-size: 0.9em;
            color: #888;
            margin-bottom: 5px;
        }

        .stat-value {
            font-size: 1.5em;
            font-weight: bold;
            color: #667eea;
        }

        .timer-value {
            color: #e74c3c;
        }

        .display-letter {
            font-size: 8em;
            font-weight: bold;
            color: #667eea;
            margin: 20px 0;
            text-shadow: 3px 3px 0 #764ba2;
            animation: bounce 0.5s ease;
        }

        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .input-area {
            margin: 30px 0;
        }

        #userInput {
            font-size: 2em;
            text-align: center;
            padding: 15px;
            width: 200px;
            border: 3px solid #667eea;
            border-radius: 10px;
            text-transform: uppercase;
            outline: none;
            transition: all 0.3s;
        }

        #userInput:focus {
            border-color: #764ba2;
            box-shadow: 0 0 15px rgba(102, 126, 234, 0.5);
        }

        #userInput.correct {
            border-color: #27ae60;
            background-color: #d4edda;
        }

        #userInput.wrong {
            border-color: #e74c3c;
            background-color: #f8d7da;
        }

        .feedback {
            font-size: 1.2em;
            margin: 15px 0;
            min-height: 30px;
            font-weight: bold;
        }

        .feedback.correct {
            color: #27ae60;
        }

        .feedback.wrong {
            color: #e74c3c;
        }

        .buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }

        button {
            padding: 12px 30px;
            font-size: 1.1em;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }

        #startBtn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        #startBtn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        #startBtn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .game-over-screen {
            display: none;
            animation: fadeIn 0.5s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .final-score {
            font-size: 4em;
            color: #667eea;
            font-weight: bold;
            margin: 20px 0;
        }

        .stats-summary {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin: 20px 0;
        }

        .summary-item {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 10px;
        }

        .summary-label {
            color: #888;
            font-size: 0.9em;
        }

        .summary-value {
            color: #667eea;
            font-size: 1.3em;
            font-weight: bold;
        }

        .difficulty-selector {
            margin: 20px 0;
        }

        .difficulty-selector label {
            margin-right: 10px;
            color: #667eea;
            font-weight: bold;
        }

        .difficulty-selector select {
            padding: 8px 15px;
            border: 2px solid #667eea;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
        }

        .hint-text {
            color: #888;
            font-size: 0.9em;
            margin-top: 15px;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <!-- 开始界面 -->
        <div id="startScreen">
            <h1>🎮 字母大挑战</h1>
            <p class="subtitle">快速输入屏幕上显示的字母！</p>
            
            <div class="difficulty-selector">
                <label>选择难度：</label>
                <select id="difficulty">
                    <option value="easy">简单 (30秒)</option>
                    <option value="medium" selected>中等 (20秒)</option>
                    <option value="hard">困难 (10秒)</option>
                </select>
            </div>

            <p class="hint-text">💡 提示：按回车键可以快速提交</p>
            
            <button id="startBtn" onclick="startGame()">开始游戏</button>
        </div>

        <!-- 游戏界面 -->
        <div id="gameScreen" style="display: none;">
            <div class="stats-bar">
                <div class="stat">
                    <span class="stat-label">分数</span>
                    <span class="stat-value" id="score">0</span>
                </div>
                <div class="stat">
                    <span class="stat-label">剩余时间</span>
                    <span class="stat-value timer-value" id="timer">20</span>
                </div>
                <div class="stat">
                    <span class="stat-label">连击</span>
                    <span class="stat-value" id="combo">0</span>
                </div>
            </div>

            <div class="display-letter" id="displayLetter">A</div>

            <div class="input-area">
                <input type="text" id="userInput" maxlength="1" placeholder="?" autocomplete="off">
            </div>

            <div class="feedback" id="feedback"></div>

            <div class="buttons">
                <button onclick="endGame()">结束游戏</button>
            </div>
        </div>

        <!-- 游戏结束界面 -->
        <div id="gameOverScreen" class="game-over-screen">
            <h1>🎉 游戏结束！</h1>
            <div class="final-score" id="finalScore">0</div>
            
            <div class="stats-summary">
                <div class="summary-item">
                    <div class="summary-label">正确答案</div>
                    <div class="summary-value" id="correctCount">0</div>
                </div>
                <div class="summary-item">
                    <div class="summary-label">错误答案</div>
                    <div class="summary-value" id="wrongCount">0</div>
                </div>
                <div class="summary-item">
                    <div class="summary-label">最高连击</div>
                    <div class="summary-value" id="maxCombo">0</div>
                </div>
                <div class="summary-item">
                    <div class="summary-label">平均速度</div>
                    <div class="summary-value" id="avgSpeed">0</div>
                </div>
            </div>

            <div class="buttons">
                <button onclick="restartGame()">再来一局</button>
                <button onclick="goToMenu()">返回菜单</button>
            </div>
        </div>
    </div>

    <script>
        // 游戏状态
        let gameState = {
            score: 0,
            currentLetter: '',
            isPlaying: false,
            timer: null,
            timeLeft: 20,
            combo: 0,
            maxCombo: 0,
            correctAnswers: 0,
            wrongAnswers: 0,
            startTime: null,
            difficultyTimes: {
                easy: 30,
                medium: 20,
                hard: 10
            }
        };

        // DOM 元素
        const startScreen = document.getElementById('startScreen');
        const gameScreen = document.getElementById('gameScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const displayLetter = document.getElementById('displayLetter');
        const userInput = document.getElementById('userInput');
        const feedback = document.getElementById('feedback');
        const scoreDisplay = document.getElementById('score');
        const timerDisplay = document.getElementById('timer');
        const comboDisplay = document.getElementById('combo');
        const difficultySelect = document.getElementById('difficulty');

        // 生成随机字母
        function generateRandomLetter() {
            const letters = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
            return letters[Math.floor(Math.random() * letters.length)];
        }

        // 开始游戏
        function startGame() {
            // 重置游戏状态
            gameState = {
                score: 0,
                currentLetter: '',
                isPlaying: true,
                timer: null,
                timeLeft: gameState.difficultyTimes[difficultySelect.value],
                combo: 0,
                maxCombo: 0,
                correctAnswers: 0,
                wrongAnswers: 0,
                startTime: Date.now(),
                difficultyTimes: gameState.difficultyTimes
            };

            // 更新UI
            startScreen.style.display = 'none';
            gameScreen.style.display = 'block';
            gameOverScreen.style.display = 'none';
            
            updateDisplay();
            generateNewLetter();
            userInput.value = '';
            userInput.focus();

            // 开始倒计时
            startTimer();
        }

        // 生成新字母
        function generateNewLetter() {
            let newLetter;
            do {
                newLetter = generateRandomLetter();
            } while (newLetter === gameState.currentLetter);
            
            gameState.currentLetter = newLetter;
            displayLetter.textContent = newLetter;
            
            // 添加动画效果
            displayLetter.style.animation = 'none';
            displayLetter.offsetHeight; // 触发重绘
            displayLetter.style.animation = 'bounce 0.5s ease';
        }

        // 开始倒计时
        function startTimer() {
            gameState.timer = setInterval(() => {
                gameState.timeLeft--;
                timerDisplay.textContent = gameState.timeLeft;
                
                // 倒计时少于5秒时显示警告色
                if (gameState.timeLeft <= 5) {
                    timerDisplay.style.color = '#e74c3c';
                } else {
                    timerDisplay.style.color = '#e74c3c';
                }
                
                if (gameState.timeLeft <= 0) {
                    endGame();
                }
            }, 1000);
        }

        // 检查答案
        function checkAnswer() {
            if (!gameState.isPlaying) return;
            
            const userAnswer = userInput.value.toUpperCase();
            
            if (userAnswer === gameState.currentLetter) {
                // 答案正确
                gameState.combo++;
                if (gameState.combo > gameState.maxCombo) {
                    gameState.maxCombo = gameState.combo;
                }
                gameState.correctAnswers++;
                
                // 计算分数（连击加成）
                const baseScore = 10;
                const comboBonus = Math.floor(gameState.combo / 3) * 5;
                gameState.score += baseScore + comboBonus;
                
                // 显示反馈
                showFeedback('正确！+' + (baseScore + comboBonus), 'correct');
                userInput.classList.add('correct');
                setTimeout(() => userInput.classList.remove('correct'), 300);
                
                // 生成新字母
                generateNewLetter();
                userInput.value = '';
            } else if (userAnswer !== '') {
                // 答案错误
                gameState.combo = 0;
                gameState.wrongAnswers++;
                gameState.score = Math.max(0, gameState.score - 5);
                
                showFeedback('错误！-5', 'wrong');
                userInput.classList.add('wrong');
                setTimeout(() => userInput.classList.remove('wrong'), 300);
            }
            
            updateDisplay();
        }

        // 显示反馈
        function showFeedback(message, type) {
            feedback.textContent = message;
            feedback.className = 'feedback ' + type;
            
            setTimeout(() => {
                feedback.textContent = '';
            }, 1000);
        }

        // 更新显示
        function updateDisplay() {
            scoreDisplay.textContent = gameState.score;
            timerDisplay.textContent = gameState.timeLeft;
            comboDisplay.textContent = gameState.combo;
        }

        // 结束游戏
        function endGame() {
            gameState.isPlaying = false;
            clearInterval(gameState.timer);
            
            // 计算统计数据
            const totalTime = (Date.now() - gameState.startTime) / 1000; // 秒
            const avgSpeed = totalTime > 0 ? (gameState.correctAnswers / totalTime).toFixed(2) : 0;
            
            // 显示游戏结束界面
            gameScreen.style.display = 'none';
            gameOverScreen.style.display = 'block';
            
            // 更新统计数据
            document.getElementById('finalScore').textContent = gameState.score;
            document.getElementById('correctCount').textContent = gameState.correctAnswers;
            document.getElementById('wrongCount').textContent = gameState.wrongAnswers;
            document.getElementById('maxCombo').textContent = gameState.maxCombo;
            document.getElementById('avgSpeed').textContent = avgSpeed + ' 个/秒';
        }

        // 重新开始
        function restartGame() {
            startGame();
        }

        // 返回菜单
        function goToMenu() {
            gameOverScreen.style.display = 'none';
            startScreen.style.display = 'block';
        }

        // 事件监听
        userInput.addEventListener('input', function() {
            this.value = this.value.toUpperCase();
            if (this.value.length === 1) {
                checkAnswer();
            }
        });

        userInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                checkAnswer();
                this.value = '';
            }
        });

        // 防止粘贴
        userInput.addEventListener('paste', function(e) {
            e.preventDefault();
        });
    </script>
</body>
</html>
